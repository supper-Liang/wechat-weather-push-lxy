name: Daily Weather Push

# 触发条件
on:
  schedule:
    # 每天 UTC 23:00 触发，对应北京时间次日 07:00
    - cron: '0 23 * * *'
  # 支持在 GitHub 网页上手动点击运行
  workflow_dispatch:

jobs:
  push-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather push script
        env:
          APP_ID:        ${{ secrets.APP_ID }}
          APP_SECRET:    ${{ secrets.APP_SECRET }}
          TEMPLATE_ID:   ${{ secrets.TEMPLATE_ID }}
          USER_ID:       ${{ secrets.USER_ID }}
          QWEATHER_KEY:  ${{ secrets.QWEATHER_KEY }}
          CITY:          ${{ secrets.CITY }}
          CITY_ID:       ${{ secrets.CITY_ID }}
          LOVE_DATE:     ${{ secrets.LOVE_DATE }}
          QWEATHER_HOST: ${{ secrets.QWEATHER_HOST }}
          BIRTHDAY: ${{ secrets.BIRTHDAY }}
        run: python main.py
